<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>在庫追加ページ</title>
</head>

<body>

    <h1>在庫追加ページ</h1>

    <form method="POST">

        <h2>商品を選択</h2>
        <select name="item">
            {% for item in items %}
            <option value="{{ item[0] }}">{{ item[1] }}</option>
            {% endfor %}
        </select>

        <h2>数量</h2>
        <input type="number" name="quantity" value="1" min="1">

        <br><br>

        <button type="submit">追加する</button>

    </form>

    <br>

    <a href="/">← 在庫一覧へ戻る</a>

</body>

</html>
