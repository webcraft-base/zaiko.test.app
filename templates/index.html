<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>在庫一覧</title>
</head>

<body>

    <h1>在庫一覧</h1>

    <table border="1">
        <tr>
            <th>商品名</th>
            <th>数量</th>
            <th>操作</th>
        </tr>

        {% for row in stock_dict %}
        <tr>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>
                <a href="/edit/{{ row[0] }}">編集</a>
                <a href="/delete/{{ row[0] }}">削除</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <h2>在庫追加</h2>
    <form method="POST">
        <select name="item">
            {% for item in items %}
            <option value="{{ item[0] }}">{{ item[1] }}</option>
            {% endfor %}
        </select>

        <input type="number" name="quantity" required>

        <button type="submit">追加</button>
    </form>

    <a href="/deleted">削除済み一覧を見る</a>

</body>

</html>
